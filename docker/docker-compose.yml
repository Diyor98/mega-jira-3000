services:
  postgres:
    image: postgres:16-alpine
    container_name: mega-jira-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mega
      POSTGRES_PASSWORD: mega
      POSTGRES_DB: mega_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mega-jira-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
